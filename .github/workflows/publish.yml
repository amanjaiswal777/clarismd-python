name: Publish

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build + twine
        run: python -m pip install --upgrade pip build twine

      - name: Verify tag matches package version
        env:
          GITHUB_REF: ${{ github.ref }}
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION=$(python -c "import re,pathlib; print(re.search(r'__version__ = \"([^\"]+)\"', pathlib.Path('src/clarismd/_version.py').read_text()).group(1))")
          if [ "$TAG" != "$PKG_VERSION" ]; then
            echo "tag v$TAG does not match package version $PKG_VERSION" >&2
            exit 1
          fi

      - name: Build sdist + wheel
        run: python -m build

      - name: Twine check
        run: twine check dist/*

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*
          if-no-files-found: error

  publish-pypi:
    name: publish to PyPI (OIDC)
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: pypi
      url: https://pypi.org/p/clarismd
    permissions:
      id-token: write
    steps:
      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
